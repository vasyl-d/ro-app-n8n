name: Publish to npm

on:
  push:
    tags:
      - '*.*.*' # Triggers when you push a version tag like 1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    # CRITICAL: These permissions allow GitHub to mint the OIDC ID token for npm provenance
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Enforces clean installation using your package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Build node production assets
        run: npm run build

      # Publishes using GitHub OIDC auth and cryptographically signs the provenance metadata
      - name: Publish to npm with Provenance
        run: npm publish --provenance --access public
